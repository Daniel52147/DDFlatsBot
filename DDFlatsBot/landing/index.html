<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="DDFlatsBot — bot Telegram do wynajmu mieszkań w Warszawie. OLX, Otodom, Gratka, Morizon w jednym miejscu. Aktualizacja co 10 minut. Bezpłatnie.">
<meta name="keywords" content="mieszkania Warszawa wynajem, bot telegram mieszkania, OLX Otodom wynajem Warszawa, квартиры Варшава аренда телеграм бот">
<meta property="og:title" content="DDFlatsBot — Mieszkania Warszawa">
<meta property="og:description" content="Wszystkie ogłoszenia wynajmu w Warszawie w jednym bocie Telegram. OLX + Otodom + Gratka + Morizon. Aktualizacja co 10 minut. Za darmo.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#2563eb">
<title>DDFlatsBot — Mieszkania Warszawa | Квартиры Варшава</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#2563eb;--blue-light:#3b82f6;--blue-dark:#1d4ed8;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
  --bg:#060b18;--bg2:#0d1526;--bg3:#111827;
  --card:#131f35;--border:#1e3a5f;--border2:#243b55;
  --text:#f8fafc;--muted:#94a3b8;--muted2:#64748b;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:rgba(6,11,24,0.8);border-bottom:1px solid rgba(30,58,95,0.5)}
.nav-logo{font-size:1.2rem;font-weight:800;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo span{color:var(--blue-light)}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.9rem;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.nav-cta{background:var(--blue);color:#fff!important;padding:8px 20px;border-radius:8px;font-weight:600!important;transition:background .2s!important}
.nav-cta:hover{background:var(--blue-dark)!important}
.lang-sw{display:flex;gap:4px}
.lb{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:all .2s}
.lb:hover,.lb.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 1.5rem 4rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(37,99,235,0.18) 0%,transparent 70%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(30,58,95,0.15) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,95,0.15) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(37,99,235,0.12);border:1px solid rgba(59,130,246,0.3);color:#93c5fd;padding:6px 18px;border-radius:100px;font-size:0.82rem;font-weight:500;margin-bottom:2rem;letter-spacing:0.02em}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 6px var(--green)}50%{opacity:.4;box-shadow:none}}
h1{font-size:clamp(2.4rem,7vw,5rem);font-weight:900;line-height:1.05;letter-spacing:-0.03em;margin-bottom:1.5rem}
h1 .hl{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(1rem,2.5vw,1.3rem);color:var(--muted);max-width:600px;margin-bottom:3rem;line-height:1.7}
.hero-sub strong{color:var(--text)}
.btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:4rem}
.btn-p{display:inline-flex;align-items:center;gap:10px;background:var(--blue);color:#fff;padding:16px 36px;border-radius:14px;font-size:1.05rem;font-weight:700;text-decoration:none;transition:all .25s;box-shadow:0 0 40px rgba(37,99,235,0.35)}
.btn-p:hover{background:var(--blue-dark);transform:translateY(-3px);box-shadow:0 8px 40px rgba(37,99,235,0.5)}
.btn-s{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);color:var(--text);padding:16px 36px;border-radius:14px;font-size:1.05rem;font-weight:600;text-decoration:none;border:1px solid var(--border2);transition:all .25s;backdrop-filter:blur(10px)}
.btn-s:hover{background:rgba(255,255,255,0.1);transform:translateY(-3px)}
.stats{display:flex;gap:3rem;flex-wrap:wrap;justify-content:center}
.stat{text-align:center}
.sn{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:0.75rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}

/* ── SOURCES ── */
.sources{padding:3rem 1.5rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.src-label{text-align:center;color:var(--muted2);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1.5rem}
.src-row{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;max-width:900px;margin:0 auto}
.src{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:100px;font-size:.9rem;font-weight:500;transition:border-color .2s,transform .2s}
.src:hover{border-color:var(--blue-light);transform:translateY(-2px)}

/* ── SECTION ── */
.sec{padding:6rem 1.5rem;max-width:1200px;margin:0 auto}
.sec-t{text-align:center;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;margin-bottom:.75rem;letter-spacing:-0.02em}
.sec-s{text-align:center;color:var(--muted);margin-bottom:3.5rem;font-size:1.05rem;max-width:560px;margin-left:auto;margin-right:auto}

/* ── FEATURES ── */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
.feat{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;transition:all .3s;position:relative;overflow:hidden}
.feat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(37,99,235,0.05),transparent);opacity:0;transition:opacity .3s}
.feat:hover{border-color:var(--blue-light);transform:translateY(-4px);box-shadow:0 20px 60px rgba(37,99,235,0.15)}
.feat:hover::before{opacity:1}
.fi{font-size:2.2rem;margin-bottom:1.2rem;display:block}
.ft{font-size:1.1rem;font-weight:700;margin-bottom:.6rem}
.fd{color:var(--muted);font-size:.95rem;line-height:1.6}
.feat-badge{display:inline-block;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);padding:2px 10px;border-radius:100px;font-size:.75rem;font-weight:600;margin-top:.75rem}

/* ── PHONE MOCKUP ── */
.demo-wrap{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;max-width:1100px;margin:0 auto}
.phone{width:280px;margin:0 auto;background:var(--bg3);border:2px solid var(--border2);border-radius:36px;padding:1.5rem 1rem;box-shadow:0 40px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);position:relative}
.phone-notch{width:80px;height:6px;background:var(--border2);border-radius:3px;margin:0 auto 1.5rem}
.msg{margin-bottom:.75rem;display:flex;flex-direction:column}
.msg.bot .bubble{background:var(--card);border:1px solid var(--border);border-radius:16px 16px 16px 4px;padding:.75rem 1rem;font-size:.8rem;line-height:1.5;max-width:90%;align-self:flex-start}
.msg.user .bubble{background:var(--blue);border-radius:16px 16px 4px 16px;padding:.75rem 1rem;font-size:.8rem;line-height:1.5;max-width:80%;align-self:flex-end}
.apt-card{background:linear-gradient(135deg,var(--bg2),var(--card));border:1px solid var(--border2);border-radius:12px;padding:.75rem;margin-top:.5rem;font-size:.75rem}
.apt-price{font-size:1rem;font-weight:800;color:#60a5fa}
.apt-badge{display:inline-block;background:rgba(34,197,94,0.2);color:#4ade80;padding:2px 8px;border-radius:6px;font-size:.7rem;font-weight:600;margin-top:4px}
.demo-text h3{font-size:1.8rem;font-weight:800;margin-bottom:1rem;line-height:1.2}
.demo-text p{color:var(--muted);margin-bottom:1.5rem;line-height:1.7}
.check-list{list-style:none;display:flex;flex-direction:column;gap:.6rem}
.check-list li{display:flex;align-items:center;gap:.75rem;color:var(--muted);font-size:.95rem}
.check-list li::before{content:'✓';color:var(--green);font-weight:700;font-size:1rem;flex-shrink:0}

/* ── STEPS ── */
.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem}
.step{text-align:center;padding:2rem 1.5rem;background:var(--card);border:1px solid var(--border);border-radius:20px;transition:transform .2s}
.step:hover{transform:translateY(-4px)}
.step-n{width:52px;height:52px;background:linear-gradient(135deg,var(--blue),#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;margin:0 auto 1.2rem}
.step-t{font-weight:700;margin-bottom:.5rem;font-size:1.05rem}
.step-d{color:var(--muted);font-size:.9rem}

/* ── PRICING ── */
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;max-width:800px;margin:0 auto}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;text-align:center}
.price-card.featured{border-color:var(--blue-light);background:linear-gradient(135deg,rgba(37,99,235,0.1),var(--card));box-shadow:0 0 40px rgba(37,99,235,0.2)}
.price-name{font-size:.85rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem}
.price-val{font-size:3rem;font-weight:900;margin-bottom:.25rem}
.price-val span{font-size:1rem;font-weight:400;color:var(--muted)}
.price-desc{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem}
.price-feats{list-style:none;text-align:left;display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.price-feats li{display:flex;align-items:center;gap:.6rem;font-size:.9rem;color:var(--muted)}
.price-feats li.on{color:var(--text)}
.price-feats li.on::before{content:'✓';color:var(--green);font-weight:700}
.price-feats li.off::before{content:'✗';color:var(--muted2)}

/* ── CTA ── */
.cta-sec{text-align:center;padding:6rem 1.5rem;background:radial-gradient(ellipse 70% 50% at 50% 50%,rgba(37,99,235,0.12),transparent)}
.cta-sec h2{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin-bottom:1rem;letter-spacing:-0.02em}
.cta-sec p{color:var(--muted);font-size:1.1rem;margin-bottom:2.5rem}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:2.5rem 1.5rem;text-align:center}
.foot-links{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
.foot-links a{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .2s}
.foot-links a:hover{color:var(--text)}
.foot-copy{color:var(--muted2);font-size:.8rem}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  nav{padding:.75rem 1rem}
  .nav-links{display:none}
  .demo-wrap{grid-template-columns:1fr}
  .phone{order:-1}
  .btns{flex-direction:column;align-items:center}
  .btn-p,.btn-s{width:100%;justify-content:center}
  .stats{gap:2rem}
}
</style>
</head>
<body>
