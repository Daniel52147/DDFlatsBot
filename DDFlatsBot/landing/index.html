form:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem}.pc-val{font-size:3rem;font-weight:900;margin-bottom:.25rem}.pc-val small{font-size:1rem;font-weight:400;color:var(--muted)}.pc-desc{color:var(--muted);font-size:.88rem;margin-bottom:1.5rem}.pc-list{list-style:none;text-align:left;display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}.pc-list li{display:flex;align-items:center;gap:.6rem;font-size:.9rem}.pc-list li.y::before{content:"checkmark";color:var(--green);font-weight:700}.pc-list li.n{color:#64748b}.pc-list li.n::before{content:"x";color:#64748b}.cta-sec{text-align:center;padding:6rem 1.5rem;background:radial-gradient(ellipse 70% 50% at 50% 50%,rgba(37,99,235,.12),transparent)}.cta-sec h2{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin-bottom:1rem}.cta-sec p{color:var(--muted);font-size:1.1rem;margin-bottom:2.5rem}footer{border-top:1px solid var(--border);padding:2.5rem 1.5rem;text-align:center}.foot-links{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}.foot-links a{color:var(--muted);text-decoration:none;font-size:.88rem}.foot-copy{color:#64748b;font-size:.78rem}.dark-sec{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}.float-btn{position:fixed;bottom:2rem;right:2rem;z-index:200;background:var(--blue);color:#fff;padding:14px 24px;border-radius:100px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(37,99,235,.5);transition:all .3s;font-size:.95rem}.float-btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(37,99,235,.6)}.users-live{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;padding:4px 14px;border-radius:100px;font-size:.8rem;margin-bottom:1rem;position:relative;z-index:1}@media(max-width:768px){.nav-r .hm{display:none}.btns{flex-direction:column;align-items:center}.bp,.bs{width:100%;max-wi
