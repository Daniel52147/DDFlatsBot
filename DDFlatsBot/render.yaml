services:
  - type: worker
    name: ddflatsbot
    env: python
    rootDir: DDFlatsBot
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # Set manually in Render dashboard
      - key: ADMIN_IDS
        value: "2066158453"
      - key: CHANNEL_ID
        value: "@ddflots"
      - key: DATA_DIR
        value: /var/data
    disk:
      name: flatsbot-data
      mountPath: /var/data
      sizeGB: 1
