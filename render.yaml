# DDFlatsBot — Render worker (polling). Set BOT_TOKEN in Render Dashboard (never commit it).
services:
  - type: worker
    name: ddflatsbot
    env: python
    rootDir: DDFlatsBot
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "2066158453"
      - key: CHANNEL_ID
        value: "@ddflots"
      - key: CHANNEL_LINK
        value: "https://t.me/ddflots"
      - key: DATA_DIR
        value: /var/data
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
    disk:
      name: flatsbot-data
      mountPath: /var/data
      sizeGB: 1
